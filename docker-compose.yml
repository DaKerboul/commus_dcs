# Local development docker-compose
# For Coolify deployment, configure services directly in the Coolify dashboard.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: commus
      POSTGRES_PASSWORD: commus
      POSTGRES_DB: commus_dcs
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
